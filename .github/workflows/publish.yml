name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Require NPM_TOKEN secret
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPM_TOKEN repository secret is not configured."
            echo "Add an npm automation token at:"
            echo "  Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: NPM_TOKEN"
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Skip if version is already on npm
        id: published
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@akeyless-community/claude-connector@${VERSION}" version 2>/dev/null; then
            echo "Version ${VERSION} is already published — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.published.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
